name: Forex Bot - Nightly ETL & Health Check

on:
  schedule:
    - cron: '0 */6 * * *'      # Every 6 hours
  workflow_dispatch:          # Manual trigger

env:
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install kaggle pandas pyyaml requests

      - name: Check Kaggle Dataset Freshness
        run: |
          python .github/scripts/check_freshness.py

      - name: Notify on Stale Data
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage             -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }}             -d text="🚨 FOREX BOT ALERT: Data freshness check failed. Kaggle ETL may be stale."

  model-release:
    runs-on: ubuntu-latest
    needs: health-check
    if: github.event.schedule == '0 0 * * *'  # Only at midnight UTC
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install kaggle onnxruntime pandas numpy pyyaml

      - name: Download Latest Models from Kaggle
        run: |
          python .github/scripts/fetch_models.py

      - name: Validate ONNX Models
        run: |
          python .github/scripts/validate_onnx.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Forex Models Nightly ${{ github.run_id }}
          files: models/*.onnx
          body: |
            Automated model release from Kaggle training pipeline.
            - Models validated via ONNX Runtime
            - Config version: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
